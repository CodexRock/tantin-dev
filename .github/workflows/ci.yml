name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        channel: 'stable'

    # Single source of truth: CI runs the EXACT same gate the agent runs locally
    # (tool/verify.dart). This guarantees "green on my machine" == "green in CI".
    # The script does: pub get, gen-l10n, build_runner, format check,
    # analyze --fatal-infos, custom_lint, tests, and (in --ci) the Android build.
    # Do NOT add ad-hoc steps here that bypass the gate — change verify.dart so
    # local and CI stay identical.
    - name: Verify (format + analyze + custom_lint + tests + build)
      run: dart run tool/verify.dart --ci

  backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: npm
    - uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '21'

    - name: Install backend test dependencies
      run: npm ci

    - name: Install Functions test dependencies
      run: npm --prefix functions ci

    - name: Test backend rules and Functions in emulators
      run: npm test
